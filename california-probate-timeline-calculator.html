<h1>California Probate Timeline Calculator</h1>

<p class="sub">
Estimate how long probate might take in California based on a few common factors.
</p>

<form id="timelineForm">

<div>
<label>Is there a valid will?</label>
<select id="will">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<div>
<label>Estimated estate value</label>
<select id="estate">
<option value="small">Under $500k</option>
<option value="medium">$500k – $2M</option>
<option value="large">Over $2M</option>
</select>
</div>

<div>
<label>Number of beneficiaries</label>
<select id="beneficiaries">
<option value="few">1–2</option>
<option value="several">3–5</option>
<option value="many">6+</option>
</select>
</div>

<div>
<label>Is real estate involved?</label>
<select id="realestate">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<button type="submit">Estimate Probate Timeline</button>

</form>

<div id="result" class="result">

<div class="timeline" id="timelineOutput"></div>

<p id="timelineText"></p>

<div class="cta">
Avoiding probate delays is one reason many families create a living trust.

<br>

<a href="#">Talk to Pillar about your options</a>
</div>

</div>

</div>
</div>

<script>

const form = document.getElementById("timelineForm");
const result = document.getElementById("result");

form.addEventListener("submit",function(e){

e.preventDefault();

let months = 9;

const will = document.getElementById("will").value;
const estate = document.getElementById("estate").value;
const beneficiaries = document.getElementById("beneficiaries").value;
const realestate = document.getElementById("realestate").value;

if(will === "no") months += 3;

if(estate === "medium") months += 3;
if(estate === "large") months += 6;

if(beneficiaries === "several") months += 2;
if(beneficiaries === "many") months += 4;

if(realestate === "yes") months += 3;

let min = months;
let max = months + 6;

document.getElementById("timelineOutput").innerText =
min + " – " + max + " months";

document.getElementById("timelineText").innerText =
"Based on your inputs, probate could reasonably take around " +
min + " to " + max + " months in California. Court schedules, creditor claims, and asset complexity can extend timelines.";

result.classList.add("show");

result.scrollIntoView({behavior:"smooth"});

});

</script>
